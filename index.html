<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login • Physio Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#00838f,#00c4cc);font-family:Poppins,sans-serif}
    .glass{background:rgba(255 255 255 /.15);border:1px solid rgba(255 255 255 /.2);border-radius:24px;padding:2.5rem;backdrop-filter:blur(20px);width:100%;max-width:360px;color:#fff}
    input{width:100%;padding:.9rem 1rem;margin:.5rem 0;border:none;border-radius:50px;background:rgba(255 255 255 /.25);color:#fff;font-size:1rem}
    input::placeholder{color:rgba(255 255 255 /.7)}
    button{width:100%;padding:.9rem;background:#fff;color:#00838f;border:none;border-radius:50px;font-weight:600;margin-top:1rem;cursor:pointer}
  </style>
</head>
<body>
  <form class="glass" onsubmit="event.preventDefault();login()">
    <h2>Anjem</h2>
    <input id="username" type="text" placeholder="Nama lengkap" required>
    <input id="email" type="email" placeholder="Email aktif" required>
    <button type="submit">Masuk</button>
    <p style="font-size:.8rem;margin-top:1rem">Belum punya akun? Daftar otomatis dengan email Anda.</p>
  </form>
  <script>
    function login(){
      const name=document.getElementById('username').value.trim();
      const email=document.getElementById('email').value.trim();
      if(!name||!email){alert('Lengkapi data');return;}
      localStorage.setItem('user_name',name);
      localStorage.setItem('user_email',email);
      location.href='app.html';
    }
  </script>
</body>
</html>
